[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1000
via_ir = true
remappings = [
    "forge-std/=lib/forge-std/src/",
    "damanfi-protocol/=lib/damanfi-protocol/src/",
    "reverbprotocol/=lib/reverbprotocol-protocol/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
]
ffi = true
fs_permissions = [{ access = "read", path = ".deployments" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC}"
